name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create deployment zip
        run: |
          cd backend
          zip -r ../backend.zip . \
            --exclude "*.pyc" \
            --exclude "*/__pycache__/*" \
            --exclude ".venv/*" \
            --exclude ".env" \
            --exclude "*.egg-info/*"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: backend.zip
